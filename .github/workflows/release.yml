name: Release

# Tagging a version (e.g. `git tag v0.1.0 && git push --tags`) builds a
# self-contained binary for each platform and attaches it to the GitHub
# release for that tag, creating the release if it does not exist yet.
on:
  push:
    tags:
      - "v*"

# Needed by softprops/action-gh-release to create the release and upload assets.
permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # build.rs writes its WordNet download here (under the cached path below)
  # instead of the default OUT_DIR, so the fetch survives across CI runs.
  RETROSAURUS_WORDNET_CACHE: .wordnet-cache

jobs:
  release:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Same as CI: saudade's Linux backends link libwayland and libxkbcommon;
      # X11 is dlopen'd at runtime. macOS/Windows need no extra packages.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev pkg-config

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # build.rs downloads the WordNet source on first build; caching keeps
      # tagged release builds fast and reproducible.
      - name: Cache WordNet source
        uses: actions/cache@v4
        with:
          path: .wordnet-cache
          key: wordnet-2025

      - name: Build (release)
        run: cargo build --release --locked --target ${{ matrix.target }}

      # The WordNet index is embedded in the binary, so the single executable is
      # self-contained. Rename it per-target before attaching it to the release.
      - name: Stage binary
        shell: bash
        run: |
          ext=""
          if [ "${{ runner.os }}" = "Windows" ]; then ext=".exe"; fi
          src="target/${{ matrix.target }}/release/retrosaurus${ext}"
          dst="retrosaurus-${{ github.ref_name }}-${{ matrix.target }}${ext}"
          cp "$src" "$dst"
          echo "ASSET=$dst" >> "$GITHUB_ENV"

      - name: Publish to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true
