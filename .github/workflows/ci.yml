name: CI
on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # build.rs writes its WordNet download here (under the cached path below)
  # instead of the default OUT_DIR, so the fetch survives across CI runs.
  RETROSAURUS_WORDNET_CACHE: .wordnet-cache

jobs:
  ci:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Linux builds saudade's SCTK + softbuffer Wayland backends, which link
      # libwayland and libxkbcommon. X11 is loaded via dlopen at runtime, so no
      # X11 dev packages are needed here. macOS/Windows need none.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev pkg-config

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # build.rs downloads the ~11 MB WordNet source on first build (via curl,
      # preinstalled on all runners) and caches it here. Restoring the cache
      # keeps CI builds offline and reproducible.
      - name: Cache WordNet source
        uses: actions/cache@v4
        with:
          path: .wordnet-cache
          key: wordnet-2025

      - name: Format check
        run: cargo fmt --all --check

      - name: Lint (clippy)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all-targets --all-features

      - name: Build (release)
        run: cargo build --release
